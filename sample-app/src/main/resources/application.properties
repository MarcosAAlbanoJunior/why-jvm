spring.application.name=why-jvm-sample
server.port=8080

# O DemoController lanca de proposito; nao polua o log com o stacktrace do Spring.
logging.level.org.springframework.web.servlet.DispatcherServlet=OFF
server.error.include-stacktrace=never

# Config local opcional (chaves do Gemini/SMTP) fora do git. Crie o arquivo na
# raiz do repo a partir de why-jvm-local.properties.example; o app sobe normal
# se ele nao existir (prefixo optional:).
spring.config.import=optional:file:./why-jvm-local.properties
